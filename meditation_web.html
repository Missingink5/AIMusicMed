<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI冥想助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: #5a67d8;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 300;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #4a5568;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #5a67d8;
            box-shadow: 0 0 0 3px rgba(90, 103, 216, 0.1);
        }

        .duration-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        input[type="number"] {
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            width: 100px;
            transition: border-color 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #5a67d8;
            box-shadow: 0 0 0 3px rgba(90, 103, 216, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #5a67d8, #667eea);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(90, 103, 216, 0.3);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(90, 103, 216, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 10px;
            display: none;
        }

        .status.processing {
            background: #ebf8ff;
            border: 1px solid #90cdf4;
            color: #2b6cb0;
            display: block;
        }

        .status.success {
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            color: #276749;
            display: block;
        }

        .status.error {
            background: #fed7d7;
            border: 1px solid #feb2b2;
            color: #c53030;
            display: block;
        }

        .comfort-message {
            background: #fef5e7;
            border: 1px solid #f6ad55;
            color: #c05621;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            font-style: italic;
        }

        .audio-player {
            margin-top: 1rem;
            width: 100%;
        }

        .audio-player audio {
            width: 100%;
            border-radius: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #5a67d8, #667eea);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .sessions-list {
            margin-top: 2rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
        }

        .session-item {
            background: #f7fafc;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-info {
            flex: 1;
        }

        .session-time {
            font-size: 0.9rem;
            color: #666;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            width: auto;
            margin-left: 0.5rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
                margin: 1rem;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .duration-group {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧘‍♀️ AI冥想助手</h1>
            <p>分享你的烦恼，获得个性化的冥想指导</p>
        </div>

        <form id="meditationForm">
            <div class="form-group">
                <label for="userInput">告诉我你的烦恼或想法：</label>
                <textarea 
                    id="userInput" 
                    name="userInput" 
                    placeholder="比如：我最近工作压力很大，总是失眠，感觉很焦虑..."
                    required
                ></textarea>
            </div>

            <div class="form-group">
                <label>冥想时长：</label>
                <div class="duration-group">
                    <input type="number" id="duration" name="duration" value="3" min="1" max="30">
                    <span>分钟</span>
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">
                🎵 生成个性化冥想音频
            </button>
        </form>

        <div id="status" class="status">
            <div id="statusMessage">正在生成您的专属冥想音频...</div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>

        <div id="comfortMessage" class="comfort-message" style="display: none;"></div>

        <div id="audioPlayer" class="audio-player" style="display: none;">
            <h3>🎧 您的冥想音频已准备好</h3>
            <audio controls>
                <source id="audioSource" src="" type="audio/wav">
                您的浏览器不支持音频播放。
            </audio>
            <p id="audioInfo"></p>
        </div>

        <div class="sessions-list">
            <h3>📚 最近的冥想会话</h3>
            <div id="sessionsList"></div>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let pollInterval = null;

        // 表单提交处理
        document.getElementById('meditationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userInput = document.getElementById('userInput').value;
            const duration = parseInt(document.getElementById('duration').value);
            
            if (!userInput.trim()) {
                alert('请输入您的烦恼或想法');
                return;
            }

            await createMeditationSession(userInput, duration);
        });

        // 创建冥想会话
        async function createMeditationSession(userInput, duration) {
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            const statusMessage = document.getElementById('statusMessage');
            
            try {
                // 禁用提交按钮
                submitBtn.disabled = true;
                submitBtn.textContent = '🎵 正在生成...';
                
                // 显示处理状态
                statusDiv.className = 'status processing';
                statusMessage.textContent = '正在生成您的专属冥想音频...';
                updateProgress(10);
                
                // 发送请求
                const response = await fetch('/meditation/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_input: userInput,
                        duration_minutes: duration,
                        cleanup: true
                    })
                });

                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.detail || '创建会话失败');
                }

                currentSessionId = result.session_id;
                
                // 开始轮询状态
                pollSessionStatus();

            } catch (error) {
                console.error('Error:', error);
                showError(error.message);
                resetForm();
            }
        }

        // 轮询会话状态
        async function pollSessionStatus() {
            if (!currentSessionId) return;

            try {
                const response = await fetch(`/meditation/status/${currentSessionId}`);
                const status = await response.json();

                if (!response.ok) {
                    throw new Error(status.detail || '查询状态失败');
                }

                // 更新进度
                if (status.progress) {
                    updateProgress(status.progress);
                }

                if (status.status === 'completed' && status.result) {
                    // 处理完成
                    showSuccess(status.result);
                    resetForm();
                    loadRecentSessions();
                } else if (status.status === 'error') {
                    // 处理失败
                    throw new Error(status.message || '处理失败');
                } else {
                    // 继续轮询
                    pollInterval = setTimeout(pollSessionStatus, 2000);
                }

            } catch (error) {
                console.error('Error polling status:', error);
                showError(error.message);
                resetForm();
            }
        }

        // 显示成功结果
        function showSuccess(result) {
            const statusDiv = document.getElementById('status');
            const statusMessage = document.getElementById('statusMessage');
            const comfortDiv = document.getElementById('comfortMessage');
            const audioPlayer = document.getElementById('audioPlayer');
            const audioSource = document.getElementById('audioSource');
            const audioInfo = document.getElementById('audioInfo');

            // 更新状态
            statusDiv.className = 'status success';
            statusMessage.textContent = '✅ 冥想音频生成完成！';
            updateProgress(100);

            // 显示安慰语
            if (result.comfort_message) {
                comfortDiv.textContent = `💝 ${result.comfort_message}`;
                comfortDiv.style.display = 'block';
            }

            // 显示音频播放器
            if (result.audio_url) {
                audioSource.src = result.audio_url;
                audioPlayer.style.display = 'block';
                
                const durationText = result.duration_seconds ? 
                    `时长: ${Math.round(result.duration_seconds)}秒` : '';
                const segmentsText = result.segments_count ? 
                    `包含 ${result.segments_count} 个引导段落` : '';
                audioInfo.textContent = `${durationText} ${segmentsText}`.trim();
            }

            // 隐藏状态2秒后
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }

        // 显示错误
        function showError(message) {
            const statusDiv = document.getElementById('status');
            const statusMessage = document.getElementById('statusMessage');
            
            statusDiv.className = 'status error';
            statusMessage.textContent = `❌ ${message}`;
            
            // 5秒后隐藏
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }

        // 更新进度条
        function updateProgress(percentage) {
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = `${percentage}%`;
        }

        // 重置表单
        function resetForm() {
            const submitBtn = document.getElementById('submitBtn');
            
            submitBtn.disabled = false;
            submitBtn.textContent = '🎵 生成个性化冥想音频';
            
            if (pollInterval) {
                clearTimeout(pollInterval);
                pollInterval = null;
            }
            
            currentSessionId = null;
        }

        // 加载最近的会话
        async function loadRecentSessions() {
            try {
                const response = await fetch('/meditation/sessions?limit=5');
                const sessions = await response.json();
                
                const sessionsList = document.getElementById('sessionsList');
                sessionsList.innerHTML = '';
                
                if (sessions.length === 0) {
                    sessionsList.innerHTML = '<p style="color: #666; text-align: center;">暂无历史会话</p>';
                    return;
                }
                
                sessions.forEach(session => {
                    const sessionDiv = document.createElement('div');
                    sessionDiv.className = 'session-item';
                    
                    const sessionInfo = document.createElement('div');
                    sessionInfo.className = 'session-info';
                    
                    const sessionTime = new Date(session.created_at).toLocaleString();
                    const sessionPreview = session.comfort_message ? 
                        session.comfort_message.substring(0, 50) + '...' : 
                        `会话 ${session.session_id}`;
                    
                    sessionInfo.innerHTML = `
                        <div>${sessionPreview}</div>
                        <div class="session-time">${sessionTime}</div>
                    `;
                    
                    const actions = document.createElement('div');
                    if (session.audio_url) {
                        const playBtn = document.createElement('button');
                        playBtn.className = 'btn btn-small';
                        playBtn.textContent = '🎧 播放';
                        playBtn.onclick = () => playSession(session);
                        actions.appendChild(playBtn);
                    }
                    
                    sessionDiv.appendChild(sessionInfo);
                    sessionDiv.appendChild(actions);
                    sessionsList.appendChild(sessionDiv);
                });
                
            } catch (error) {
                console.error('Error loading sessions:', error);
            }
        }

        // 播放历史会话
        function playSession(session) {
            const audioPlayer = document.getElementById('audioPlayer');
            const audioSource = document.getElementById('audioSource');
            const audioInfo = document.getElementById('audioInfo');
            const comfortDiv = document.getElementById('comfortMessage');
            
            // 显示安慰语
            if (session.comfort_message) {
                comfortDiv.textContent = `💝 ${session.comfort_message}`;
                comfortDiv.style.display = 'block';
            }
            
            // 播放音频
            audioSource.src = session.audio_url;
            audioPlayer.style.display = 'block';
            
            const durationText = session.duration_seconds ? 
                `时长: ${Math.round(session.duration_seconds)}秒` : '';
            const segmentsText = session.segments_count ? 
                `包含 ${session.segments_count} 个引导段落` : '';
            audioInfo.textContent = `${durationText} ${segmentsText}`.trim();
            
            // 滚动到音频播放器
            audioPlayer.scrollIntoView({ behavior: 'smooth' });
        }

        // 页面加载时获取最近会话
        document.addEventListener('DOMContentLoaded', function() {
            loadRecentSessions();
        });
    </script>
</body>
</html>
